---

- name: Check if uv is installed
  ansible.builtin.stat:
    path: "{{ home }}/.local/bin/uv"
  register: uv_binary

- name: Download uv installer
  when: not uv_binary.stat.exists
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: "0755"
    force: true

- name: Install uv
  when: not uv_binary.stat.exists
  ansible.builtin.command:
    argv:
      - /tmp/uv-install.sh
  args:
    creates: "{{ home }}/.local/bin/uv"

- name: Check for uv updates
  ansible.builtin.command:
    argv:
      - "{{ home }}/.local/bin/uv"
      - self
      - update
      - --dry-run
  register: uv_update_check
  changed_when: false
  when: uv_binary.stat.exists

- name: Update uv
  ansible.builtin.command:
    argv:
      - "{{ home }}/.local/bin/uv"
      - self
      - update
  when:
    - uv_binary.stat.exists
    - "'Would update uv' in uv_update_check.stdout"
