---

- name: Upgrade packages
  become: true
  ansible.builtin.package:
    name: '*'
    state: latest

- name: Install common packages
  become: true
  ansible.builtin.package:
    name:
      - curl
      - wget
      - git
      - snapd
      - "{{ 'libssl-dev' if ansible_pkg_mgr == 'apt' else 'openssl-devel' }}"
    state: latest
