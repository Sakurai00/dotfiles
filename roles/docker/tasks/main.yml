---
- name: Install dependencies for Docker (apt)
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: Add Docker GPG key (apt)
  become: true
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: Add Docker repository (apt)
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  when: ansible_pkg_mgr == 'apt'

- name: Install dnf-plugins-core (dnf)
  become: true
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present
  when: ansible_pkg_mgr == 'dnf'

- name: Add Docker repository (dnf)
  become: true
  ansible.builtin.shell:
    cmd: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
    creates: /etc/yum.repos.d/docker-ce.repo
  when: ansible_pkg_mgr == 'dnf'

- name: Install Docker components
  become: true
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Link docker.zsh completion
  ansible.builtin.file:
    src: "{{ role_path }}/files/.zsh/conf.d/docker.zsh"
    dest: "{{ home }}/.zsh/conf.d/docker.zsh"
    state: link
    force: true
